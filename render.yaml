services:
  - type: web
    name: youtube-empire-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -e "."
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: KLING_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: CREATOMATE_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.15"
    disk:
      name: empire-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: youtube-empire-dashboard
    runtime: node
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
